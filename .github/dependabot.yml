version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Group all otel updates into a single PR so the 0.218 → 0.220 churn
    # doesn't fan out into 7 separate PRs per minor bump.
    groups:
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      nestjs:
        patterns:
          - "@nestjs/*"
      drizzle:
        patterns:
          - drizzle-orm
          - drizzle-kit
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
