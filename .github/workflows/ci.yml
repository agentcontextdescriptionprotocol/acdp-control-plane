name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: tsc + jest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint -- --max-warnings 30
      - name: TypeScript compile
        run: npx tsc --noEmit -p tsconfig.json
      - name: Unit tests
        run: npx jest --testPathIgnorePatterns='/test/integration/' --ci
        env:
          NODE_ENV: test

  integration:
    name: jest integration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acdp_control_plane_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5433/acdp_control_plane_test
      NODE_ENV: test
      CI: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Integration tests
        run: npm run test:integration
